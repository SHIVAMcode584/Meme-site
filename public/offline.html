<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />
    <title>RoastRiot Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background:
          radial-gradient(circle at 20% 0%, rgba(124, 58, 237, 0.3), transparent 40%),
          radial-gradient(circle at 80% 100%, rgba(232, 121, 249, 0.2), transparent 35%),
          #070b14;
        color: #fff;
        padding: 24px;
      }
      .card {
        width: min(520px, 100%);
        border-radius: 28px;
        background: rgba(13, 18, 32, 0.9);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 28px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
      .spinner {
        width: 56px;
        height: 56px;
        margin: 0 auto 18px;
        border-radius: 999px;
        border: 4px solid rgba(255, 255, 255, 0.18);
        border-top-color: #7c3aed;
        animation: spin 1s linear infinite;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.7rem;
      }
      p {
        margin: 0 0 22px;
        color: #a1a1aa;
        line-height: 1.55;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 18px;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(90deg, #7c3aed, #d946ef);
        cursor: pointer;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="spinner" aria-hidden="true"></div>
      <h1>You are offline</h1>
      <p>RoastRiot is still installed. Reconnect to keep discovering fresh memes.</p>
      <button onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
